name: Release distributions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Artifact version segment for ass-kicker-{version} (e.g. 1.0.0). Used when not building from a v* tag.'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Resolve version label
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            V="${{ github.event.inputs.version }}"
          else
            V="$(cd svr && mvn help:evaluate -q -DforceStdout -Dexpression=project.version)"
          fi
          echo "version=${V}" >> "${GITHUB_OUTPUT}"

      - name: Build module distributions
        working-directory: svr
        run: mvn -B clean package -DskipTests

      - name: Stage renamed archives
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          mkdir -p dist
          cp "svr/manager/target/$(basename "$(find svr/manager/target -maxdepth 1 -name 'manager-*.tar.gz' | head -n 1)")" "dist/manager-${V}.tar.gz"
          cp "svr/manager/target/$(basename "$(find svr/manager/target -maxdepth 1 -name 'manager-*.zip' | head -n 1)")" "dist/manager-${V}.zip"
          cp "svr/worker/target/$(basename "$(find svr/worker/target -maxdepth 1 -name 'worker-*.tar.gz' | head -n 1)")" "dist/worker-${V}.tar.gz"
          cp "svr/worker/target/$(basename "$(find svr/worker/target -maxdepth 1 -name 'worker-*.zip' | head -n 1)")" "dist/worker-${V}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: manager-${{ steps.ver.outputs.version }}-dist
          path: |
            dist/manager-${{ steps.ver.outputs.version }}.tar.gz
            dist/manager-${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: worker-${{ steps.ver.outputs.version }}-dist
          path: |
            dist/worker-${{ steps.ver.outputs.version }}.tar.gz
            dist/worker-${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error
