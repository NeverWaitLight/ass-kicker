spring:
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
      exclude: META-INF/maven/**,META-INF/resources/**,resources/**,static/**,public/**,templates/**,**/*Test.class,**/*Tests.class
      additional-exclude: logs/**,tmp/**
    livereload:
      enabled: true
      port: 35729
  data:
    mongodb:
      auto-index-creation: true
  reactor:
    debug-agent:
      enabled: true
  codec:
    log-request-details: true

logging:
  level:
    root: INFO
    com.github.waitlight.asskicker: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb.core: DEBUG
    org.mongodb.driver: INFO
    reactor.netty.http.client: DEBUG
    reactor.netty.http.server: INFO

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    env:
      show-values: always
    configprops:
      show-values: always

scalar:
  enabled: true

ass-kicker:
  channel:
    debug:
      enabled: true
