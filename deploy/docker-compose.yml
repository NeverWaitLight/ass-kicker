services:
  mongo:
    image: mongo:7.0
    container_name: ass-kicker-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval "db.adminCommand(''ping'').ok" | grep 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka:
    image: apache/kafka:3.9.1
    container_name: ass-kicker-kafka
    restart: unless-stopped
    environment:
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  manager:
    build:
      context: ../svr
      dockerfile: manager/Dockerfile
    container_name: ass-kicker-manager
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      ASS_KICKER_SECURITY_JWT_SECRET: ${JWT_SECRET}
      ASS_KICKER_CHANNEL_DEBUG_ENABLED: ${ASS_KICKER_CHANNEL_DEBUG_ENABLED:-false}
      ASS_KICKER_SNOWFLAKE_DATACENTER_ID: ${ASS_KICKER_SNOWFLAKE_DATACENTER_ID:-0}
      ASS_KICKER_SNOWFLAKE_WORKER_ID: ${ASS_KICKER_SNOWFLAKE_WORKER_ID:-}
      SERVER_PORT: 8080
    ports:
      - "${MANAGER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    build:
      context: ../svr
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ASS_KICKER_SECURITY_JWT_SECRET: ${JWT_SECRET}
      ASS_KICKER_CHANNEL_DEBUG_ENABLED: ${ASS_KICKER_CHANNEL_DEBUG_ENABLED:-false}
      ASS_KICKER_SNOWFLAKE_DATACENTER_ID: ${ASS_KICKER_SNOWFLAKE_DATACENTER_ID:-0}
      ASS_KICKER_SNOWFLAKE_WORKER_ID: ${ASS_KICKER_SNOWFLAKE_WORKER_ID:-}
      SERVER_PORT: 8081
    ports:
      - "${WORKER_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ass-kicker-frontend
    restart: unless-stopped
    depends_on:
      manager:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8088}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
  kafka-data:
