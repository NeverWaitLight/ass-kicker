spring:
  application:
    name: backend
  messages:
    basename: ValidationMessages
    encoding: UTF-8
  main:
    web-application-type: reactive
  data:
    mongodb:
      uri: mongodb://admin:123456@localhost:27017/asskicker?authSource=admin
      auto-index-creation: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ass-kicker
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
send-record:
  buffer-size: 100
  flush-interval-ms: 5000
  ttl-days: 7
ass-kicker:
  snowflake:
    # 机房 ID（0–31），按部署环境写死；同机房实例应使用相同值
    datacenter-id: 0
    # 机器 ID（0–31）留空则启动时通过心跳注册表线性探测分配；本地可写死例如 0 以避免网络依赖
    # worker-id: 0
    mongo-allocation-enabled: true
    counter-collection: snowflake_counters
    allocation-block-timeout: PT30S
    # 心跳续期间隔（默认 PT1M）
    heartbeat-interval: PT1M
    # 超过此时间无心跳视为下线，其 workerId 可被复用（默认 PT3M）
    heartbeat-timeout: PT3M
  cache:
    maximum-size: 1000
    expire-after-write-minutes: 10
    random-jitter-percent: 20
  channel:
    debug:
      enabled: true
      sleep-ms: 100
  security:
    jwt:
      secret: change-this-secret-to-32-chars-minimum
      access-token-ttl: PT24H
      refresh-token-ttl: PT720H
logging:
  async:
    queue-size: 1024
    discarding-threshold: 0
server:
  port: 8080
scalar:
  enabled: true
  path: /scalar
